<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="transparent">
    <title>Gaia Bought Desktop Home Screen</title>

    <!-- Native bridge and platform initialization environment scripts -->
    <script defer src="js/setup.js"></script>
    <script defer src="js/core.js"></script>
    <script defer src="js/location.js"></script>
    <script defer src="js/apps.js"></script>
    <script defer src="js/app.js"></script>

    <!-- Core styling files -->
    <link rel="stylesheet" href="style/window.css">
    <link rel="stylesheet" href="style/grid.css">
    <link rel="stylesheet" href="style/apps-panel.css">
    <link rel="stylesheet" href="style/pages-panel.css">

    <!-- Unified modern styling framework layout -->
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
      body, html { width: 100%; height: 100%; overflow: hidden; background: #121212; color: #fff; }

      /* Primary viewport desktop space containing operational apps wrapper */
      #desktop-container {
        width: 100%;
        height: calc(100% - 48px);
        position: relative;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      }

      /* Fixed bottom taskbar panel module */
      #system-taskbar {
        position: absolute; bottom: 0; left: 0;
        width: 100%; height: 48px;
        background: rgba(18, 18, 18, 0.95); border-top: 1px solid rgba(255,255,255,0.05);
        display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1001;
      }
      #btn-launcher { padding: 6px 14px; font-size: 14px; background: #0078d4; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
      #btn-launcher:hover { background: #0086ea; }

      #taskbar-running-tabs { display: flex; gap: 8px; flex-grow: 1; margin-left: 20px; }
      
      /* Status notification panel */
      #system-status-tray { display: flex; align-items: center; gap: 15px; font-size: 13px; color: #cbd5e1; }
      #btn-power { background: #ff3b30; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
      #btn-power:hover { background: #e03126; }

      /* Fixed standard CSS grid overlay fallback matching original metrics */
      .apps-grid-view {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        gap: 25px;
        padding: 20px;
        width: 100%;
      }
      .gui-hidden { display: none !important; }
    </style>
  </head>

  <body>
    <!-- 1. PRIMARY OPERATIONAL HOST VIEWPORT INTERFACE -->
    <div id="desktop-container"></div>

    <!-- 2. TRADITIONAL GAIA HOMESCREEN APP DRAWER LAYER -->
    <div id="launcher-menu" class="gui-hidden" style="position: absolute; bottom: 58px; left: 15px; width: 420px; height: 500px; background: rgba(25,25,25,0.95); border-radius: 12px; border: 1px solid #333; padding: 15px; z-index: 1000; overflow-y: auto;">
      <header id="page-indicator-header" style="margin-bottom: 15px; text-align: center;">
        <div id="page-indicator" role="slider" aria-valuemin="1" aria-valuenow="1" aria-valuemax="2">
          <h2 style="font-size: 16px; color: #0078d4;">Gaia Applications Grid</h2>
        </div>
      </header>
      
      <div id="panels">
        <!-- Replaced gaia-container with standard valid div blocks using original layout hooks -->
        <div id="apps-panel">
          <div class="scrollable">
            <div id="apps" class="apps-grid-view"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. UNIFIED PC OPERATIONS TOOLBAR SYSTEM -->
    <div id="system-taskbar">
      <button id="btn-launcher" onclick="toggleLauncher()">🎯 Menu</button>
      <div id="taskbar-running-tabs"></div>
      <div id="system-status-tray">
        <span id="tray-location">📍 Detecting Location...</span>
        <span id="tray-wifi">📶 Online</span>
        <span id="tray-time">00:00</span>
        <button id="btn-power" onclick="powerOff()">SHUTDOWN</button>
      </div>
    </div>
  </body>
</html>

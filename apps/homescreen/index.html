<!DOCTYPE html><html><head><meta charset="utf-8"><title>DESKTOP 1</title><style>*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}body,html{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;}#desktop-container{width:100%;height:calc(100% - 48px);position:relative;background:url('https://unsplash.com') no-repeat center center/cover;}.desktop-header-title{position:absolute;top:15px;left:50%;transform:translateX(-50%);font-size:20px;text-shadow:1px 1px 4px #000;}.desktop-icons-side{position:absolute;top:30px;left:20px;display:flex;flex-direction:column;gap:20px;}.desktop-shortcut-card{display:flex;flex-direction:column;align-items:center;width:85px;padding:8px 4px;cursor:pointer;border-radius:4px;}.desktop-shortcut-card:hover{background:rgba(255,255,255,0.15);}.desktop-shortcut-card .icon-img{font-size:30px;margin-bottom:6px;}.desktop-shortcut-card .label-text{font-size:12px;text-shadow:1px 1px 3px #000;}.widgets-container-right{position:absolute;top:30px;right:30px;display:flex;flex-direction:column;align-items:flex-end;gap:15px;}.weather-widget-box{background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(8px);border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:15px;}.weather-widget-box .sun-art{font-size:32px;}.weather-widget-box .info-stack{display:flex;flex-direction:column;}.weather-widget-box .title-sky{font-size:13px;color:#ccc;}.weather-widget-box .temp-num{font-size:20px;font-weight:bold;}.weather-widget-box .loc-text{font-size:11px;color:#999;}.clock-widget-circle{width:90px;height:90px;border-radius:50%;background:rgba(0,0,0,0.7);border:2px dashed rgba(255,255,255,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;}.clock-widget-circle .big-time{font-size:18px;font-weight:bold;}.clock-widget-circle .small-date{font-size:9px;color:#888;margin-top:4px;}.date-time-bubble-tag{background:#1e3a8a;border:1px solid #3b82f6;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;}#system-taskbar{position:absolute;bottom:0;left:0;width:100%;height:48px;background:#0f172a;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 15px;z-index:1001;}.start-button-wrapper-cyan{display:flex;align-items:center;justify-content:center;background:#0ea5e9;border-radius:8px;padding:4px 12px;cursor:pointer;gap:8px;border:none;}.start-button-wrapper-cyan:hover{background:#0284c7;}.start-button-wrapper-cyan .hf-element-logo{width:24px;height:24px;background:#fff;color:#000;border-radius:4px;font-family:serif;font-weight:bold;font-size:12px;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid #000;}.start-button-wrapper-cyan .hf-element-logo::after{content:"72";position:absolute;top:1px;right:2px;font-size:6px;font-weight:normal;}.start-button-wrapper-cyan .text-label{font-weight:800;font-size:15px;color:#fff;}.pinned-apps-tray{display:flex;align-items:center;gap:12px;margin-left:15px;}.pinned-app-icon{font-size:22px;cursor:pointer;}.center-taskbar-banner{font-size:13px;font-weight:bold;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;}.right-status-tray-PC{display:flex;align-items:center;gap:15px;font-size:13px;color:#cbd5e1;}.status-icon-item{cursor:pointer;}.live-text-clock-stack{display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;}.live-text-clock-stack .time-string{font-weight:bold;font-size:12px;}.live-text-clock-stack .date-string{font-size:10px;color:#94a3b8;}#launcher-menu{position:absolute;bottom:58px;left:15px;width:400px;height:460px;background:rgba(15,23,42,0.96);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:18px;z-index:1000;backdrop-filter:blur(10px);}.launcher-title{font-size:15px;color:#0ea5e9;font-weight:bold;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:8px;}.apps-grid-layout{display:grid;grid-template-columns:repeat(3, 1fr);gap:14px;}.gui-hidden{display:none!important;}</style></head><body><div id="desktop-container"><div class="desktop-header-title">DESKTOP 1</div><div class="desktop-icons-side"><div class="desktop-shortcut-card" onclick="toggleLauncher()"><div class="icon-img">💻</div><div class="label-text">My Computer</div></div><div class="desktop-shortcut-card"><div class="icon-img">🗑️</div><div class="label-text">Recycle Bin</div></div><div class="desktop-shortcut-card"><div class="icon-img">🌐</div><div class="label-text">Network</div></div><div class="desktop-shortcut-card"><div class="icon-img">📁</div><div class="label-text">Projects</div></div><div class="desktop-shortcut-card"><div class="icon-img">📄</div><div class="label-text">readme.txt</div></div></div><div class="widgets-container-right"><div class="weather-widget-box"><div class="sun-art">☀️</div><div class="info-stack"><span class="title-sky">Sunny</span><span class="temp-num">24°C</span><span class="loc-text">📍 Location: Ha Noi</span></div></div><div class="clock-widget-circle"><span class="big-time" id="widget-time-string">17:32</span><span class="small-date" id="widget-date-string">Jun 24, 2026</span></div><div class="date-time-bubble-tag">DATE & TIME</div></div></div><div id="launcher-menu" class="gui-hidden"><div class="launcher-title">Ứng Dụng Hệ Thống</div><div id="apps" class="apps-grid-layout"></div></div><div id="system-taskbar"><div style="display:flex;align-items:center;"><button class="start-button-wrapper-cyan" id="start-btn-trigger" onclick="toggleLauncher()"><div class="hf-element-logo">Hf</div><div class="text-label">B</div></button><div class="pinned-apps-tray"><span class="pinned-app-icon" onclick="toggleLauncher()">📁</span><span class="pinned-app-icon">🌐</span><span class="pinned-app-icon">⚙️</span><span class="pinned-app-icon">📟</span></div></div><div class="center-taskbar-banner">Taskbar</div><div class="right-status-tray-PC"><span class="status-icon-item">📶</span><span class="status-icon-item">🔊 80%</span><span class="status-icon-item">🔋 92%</span><div class="live-text-clock-stack"><span class="time-string" id="taskbar-time-string">10:14 AM</span><span class="date-string" id="taskbar-date-string">24/06/2026</span></div></div></div><script>setInterval(()=>{const n=new Date();document.getElementById('widget-time-string').innerText=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});document.getElementById('widget-date-string').innerText=n.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});document.getElementById('taskbar-time-string').innerText=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true});document.getElementById('taskbar-date-string').innerText=n.toLocaleDateString('vi-VN');},1000);</script><script src="js/setup.js"></script><script src="js/apps.js"></script></body></html>

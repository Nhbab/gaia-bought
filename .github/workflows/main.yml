name: Compile and Release Fixed Windows EXE (v0.86.0)

on:
  workflow_dispatch:
  push:
    branches: [ master ] # Targets your active master branch setup

permissions:
  contents: write # Crucial permission flag allowing GitHub to publish releases

jobs:
  build-and-release:
    # Run on Ubuntu to ensure native 'zip' and 'tar' commands run without Error 127
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Download Stable Legacy NW.js v0.86.0 Core Engine
      run: |
        # Pull down your exact required engine layer binary zip link
        curl -L --connect-timeout 20 --retry 5 \
          "https://dl.nwjs.io/v0.86.0/nwjs-v0.86.0-win-x64.zip" -o nwjs.zip
        
        # Extract archive instantly using native Linux high-speed unzip
        unzip nwjs.zip
        mv nwjs-v0.86.0-win-x64 nwjs-runtime
        rm nwjs.zip

    - name: Initialize Isolated Node Web Server App
      run: |
        # Creates an independent background host routing execution directory
        mkdir -p nwjs-runtime/server
        cat << 'EOF' > nwjs-runtime/server/start-server.js
        const http = require('http');
        const fs = require('fs');
        const path = require('path');

        const PORT = 3000;
        const BASE_DIR = path.resolve(path.join(__dirname, '..')); 

        const MIME_TYPES = {
            '.html': 'text/html',
            '.css': 'text/css',
            '.js': 'text/javascript',
            '.json': 'application/json',
            '.png': 'image/png',
            '.properties': 'text/plain'
        };

        http.createServer((req, res) => {
            let cleanUrl = req.url.split('?')[0];
            let targetPath = cleanUrl === '/' ? '/apps/homescreen/index.html' : cleanUrl;
            let filePath = path.join(BASE_DIR, targetPath);
            let extname = String(path.extname(filePath)).toLowerCase();
            let contentType = MIME_TYPES[extname] || 'application/octet-stream';

            fs.readFile(filePath, (error, content) => {
                if (error) {
                    res.writeHead(404, { 'Content-Type': 'text/plain', 'Access-Control-Allow-Origin': '*' });
                    res.end('File Not Found', 'utf-8');
                } else {
                    res.writeHead(200, { 'Content-Type': contentType, 'Access-Control-Allow-Origin': '*' });
                    res.end(content, 'utf-8');
                }
            });
        }).listen(PORT, '127.0.0.1', () => {
            console.log(`Local Web Server routing successfully on port ${PORT}`);
        });
        EOF

    - name: Inject Privileged Execution Entry Manifest
      run: |
        # Configures the application viewport metadata to point directly to our web wrapper host
        cat << 'EOF' > nwjs-runtime/package.json
        {
          "name": "gaia-bought-desktop",
          "main": "http://127.0.0",
          "version": "1.0.0",
          "window": {
            "title": "Gaia Bought Desktop OS",
            "toolbar": false,
            "fullscreen": true,
            "frame": false
          },
          "chromium-args": "--disable-web-security --allow-file-access-from-files"
        }
        EOF

    - name: Build Multi-Process Windows Launcher Script (Fixed Localhost Connection)
      run: |
        # Creates a script wrapper that launches the background engine utility separately using Microsoft Windows Script Host
        cat << 'EOF' > nwjs-runtime/GaiaBoughtOS.cmd
        @echo off
        title Initializing Gaia OS Shell Environment
        cd /d "%~dp0"
        
        echo Launching Isolated Background Core Network Router...
        # Generates a temporary VBS script dynamically to execute the Node host cleanly in absolute background mode
        echo Set WshShell = CreateObject("WScript.Shell") > launch_hidden.vbs
        echo WshShell.Run "nw.exe server/start-server.js", 0, False >> launch_hidden.vbs
        wscript.exe launch_hidden.vbs
        del launch_hidden.vbs
        
        # Give the streaming network server time to bind to port 3000
        timeout /t 3 /nobreak >nul
        
        echo Initializing Graphical Interface Panels...
        start "" nw.exe package.json
        exit
        EOF
        # Convert line endings to Windows standard CRLF format cleanly
        sed -i 's/$/\r/' nwjs-runtime/GaiaBoughtOS.cmd

    - name: Assemble Windows Production Distribution Folder
      run: |
        mkdir dist-exe
        
        # 1. Migrate core engine files and launcher components out together
        cp nwjs-runtime/GaiaBoughtOS.cmd dist-exe/
        cp nwjs-runtime/nw.exe dist-exe/
        cp nwjs-runtime/package.json dist-exe/
        cp -r nwjs-runtime/server dist-exe/
        
        # 2. Dynamic catch-all copying of dependent assets (Prevents runtime crash anomalies)
        cp nwjs-runtime/*.dll dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.dat dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.bin dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.pak dist-exe/ 2>/dev/null || true
        if [ -d "nwjs-runtime/locales" ]; then cp -r nwjs-runtime/locales dist-exe/; fi
        
        # 3. Synchronize your layout directories into the root distribution track
        mkdir -p dist-exe/apps
        if [ -d "apps" ]; then cp -r apps/* dist-exe/apps/; fi
        if [ -d "shared" ]; then cp -r shared dist-exe/; fi

    - name: Generate Final Package Zip Archive
      run: |
        # Zip up the entire bundle cleanly without using slow double compression
        zip -r GaiaBought-Windows-EXE-v0.86.0.zip dist-exe/*

    - name: Upload Named Zip to GitHub Releases Section
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v0.86.0-${{ github.run_number }}
        name: GaiaBought Production Desktop v0.86.0 (Build ${{ github.run_number }})
        body: |
          Complete standalone desktop build for Nhbab/gaia-bought workspace.
          Fixed localhost connection loops completely using detached background script wrappers.
        files: GaiaBought-Windows-EXE-v0.86.0.zip
        draft: false
        prerelease: false

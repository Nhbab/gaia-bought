name: Compile and Release Fixed Windows EXE (v0.86.0)

on:
  workflow_dispatch:
  push:
    branches: [ master ] # Targets your specific master branch configuration

permissions:
  contents: write # Essential flag allowing GitHub to publish release packages

jobs:
  build-and-release:
    # Executes on an Ubuntu runner to guarantee native zip and folder commands succeed
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Download Exact Legacy NW.js v0.86.0 Core Engine
      run: |
        # Pull down your exact required engine layer binary zip link
        curl -L --connect-timeout 20 --retry 5 \
          "https://dl.nwjs.io/v0.86.0/nwjs-v0.86.0-win-x64.zip" -o nwjs.zip
        
        # Extract archive instantly using native Linux decompression tools
        unzip nwjs.zip
        mv nwjs-v0.86.0-win-x64 nwjs-runtime
        rm nwjs.zip

    - name: Construct Standalone App Manifest Environment
      run: |
        # Creates a local manifest configuration tailored to resolve legacy cross-origin sandbox blocks
        cat << 'EOF' > apps/homescreen/package.json
        {
          "name": "gaia-bought-desktop",
          "main": "index.html",
          "version": "1.0.0",
          "window": {
            "title": "Gaia Bought Desktop OS",
            "toolbar": false,
            "fullscreen": true,
            "frame": false,
            "show": true
          },
          "chromium-args": "--disable-web-security --allow-file-access-from-files --disable-gpu --mixed-context"
        }
        EOF

    - name: Compile Application Web Components Tree
      run: |
        # Combines your homescreen directory along with structural tracking pathways into the container folder
        mkdir -p staging_package
        cp -r apps/homescreen/* staging_package/
        
        # Pulls in the structural shared source folders if tracked inside your repository branch layout
        if [ -d "shared" ]; then cp -r shared staging_package/; fi
        if [ -d "apps/shared" ]; then cp -r apps/shared staging_package/; fi

    - name: Build Unified package.nw System Container
      run: |
        # Packs everything into the exact folder naming structure that NW.js runs natively on Windows
        cd staging_package
        zip -r ../nwjs-runtime/package.nw *
        cd ..

    - name: Assemble Windows Production Distribution Folder
      run: |
        mkdir dist-exe
        
        # 1. Migrate core engine binary assets and package containers out together
        cp nwjs-runtime/nw.exe dist-exe/GaiaBoughtOS.exe
        cp nwjs-runtime/package.nw dist-exe/
        
        # 2. Dynamic catch-all copying of system dependencies (Prevents crash anomalies)
        cp nwjs-runtime/*.dll dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.dat dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.bin dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.pak dist-exe/ 2>/dev/null || true
        if [ -d "nwjs-runtime/locales" ]; then cp -r nwjs-runtime/locales dist-exe/; fi

    - name: Generate Final Package Zip Archive
      run: |
        # Zip up the entire bundle cleanly without using slow double compression loops
        zip -r GaiaBought-Windows-EXE-v0.86.0.zip dist-exe/*

    - name: Upload Named Zip to GitHub Releases Section
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v0.86.0-${{ github.run_number }}
        name: GaiaBought Production Desktop v0.86.0 (Build ${{ github.run_number }})
        body: |
          Complete standalone desktop build for Nhbab/gaia-bought workspace.
          Fixed the localhost blank window render error by migrating structure to a native package.nw app container.
        files: GaiaBought-Windows-EXE-v0.86.0.zip
        draft: false
        prerelease: false

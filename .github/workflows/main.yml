name: Manual Compile Windows EXE (NW.js v0.112.0)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Download Specific NW.js v0.112.0 Windows Engine Core
      shell: bash
      run: |
        # Fetches the specific runtime execution wrapper
        curl -L https://dl.nwjs.io/v0.112.0/nwjs-v0.112.0-win-x64.zip -o nwjs.zip
        # Unzip works because it uses the pre-installed Windows tar/unzip handler
        unzip nwjs.zip
        mv nwjs-v0.112.0-win-x64 nwjs-runtime

    - name: Package Gaia Interface using Native PowerShell (Fixes Error 127)
      shell: powershell
      run: |
        # Navigates to your app source folder and creates a standard zip archive using native Windows tools
        Compress-Archive -Path "apps\homescreen\*" -DestinationPath "gaia-app.zip" -Force
        # Renames the extension directly to .nw as required by NW.js
        Rename-Item -Path "gaia-app.zip" -NewName "gaia-app.nw"

    - name: Fuse GUI Archive Directly into Native Executable Header
      shell: cmd
      run: |
        # Merges binary layout elements into your custom system app shell
        copy /b nwjs-runtime\nw.exe + gaia-app.nw nwjs-runtime\GaiaBoughtOS.exe

    - name: Assemble Windows Production Distribution Folder
      shell: bash
      run: |
        mkdir dist-exe
        # Extract the standalone runtime app frame out
        cp nwjs-runtime/GaiaBoughtOS.exe dist-exe/
        # Move all structural dependent platform DLL binaries
        cp nwjs-runtime/*.dll dist-exe/
        cp nwjs-runtime/nw.pak dist-exe/
        cp nwjs-runtime/icudtl.dat dist-exe/
        
        # Preserve structural sub-folders required by NW.js v0.112.0
        if [ -d "nwjs-runtime/locales" ]; then cp -r nwjs-runtime/locales dist-exe/; fi
        if [ -d "nwjs-runtime/swiftshader" ]; then cp -r nwjs-runtime/swiftshader dist-exe/; fi

    - name: Deploy Compiled Executable Build to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GaiaBought-Windows-EXE-v0.112.0
        path: dist-exe/

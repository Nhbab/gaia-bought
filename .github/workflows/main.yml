name: Compile and Release Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write # Grants the workflow permission to create a GitHub Release

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Speed-Download NW.js v0.112.0 Engine Core
      shell: bash
      run: |
        # Retains your exact requested core engine distribution download link
        curl -L --connect-timeout 20 --retry 5 \
          "https://dl.nwjs.io/v0.112.0/nwjs-v0.112.0-win-x64.zip" -o nwjs.zip
        
        # Unpack files instantly using native high-speed tar tools
        tar -xf nwjs.zip
        mv nwjs-v0.112.0-win-x64 nwjs-runtime
        rm nwjs.zip

    - name: Package Gaia Interface using Native PowerShell
      shell: powershell
      run: |
        Compress-Archive -Path "apps\homescreen\*" -DestinationPath "gaia-app.zip" -Force
        Rename-Item -Path "gaia-app.zip" -NewName "gaia-app.nw"

    - name: Fuse GUI Archive Directly into Native Executable Header
      shell: cmd
      run: |
        copy /b nwjs-runtime\nw.exe + gaia-app.nw nwjs-runtime\GaiaBoughtOS.exe

    - name: Assemble Windows Production Distribution Folder
      shell: bash
      run: |
        mkdir dist-exe
        cp nwjs-runtime/GaiaBoughtOS.exe dist-exe/
        cp nwjs-runtime/*.dll dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.dat dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.bin dist-exe/ 2>/dev/null || true

    - name: Generate Lightweight Distribution Zip File
      shell: powershell
      run: |
        # Creates a single deployment zip for the Release page without double compression slowdowns
        Compress-Archive -Path "dist-exe\*" -DestinationPath "GaiaBoughtOS-win-x64.zip" -Force

    - name: Create Automated GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: GaiaBought Desktop Release v1.0.${{ github.run_number }}
        body: |
          Automated desktop environment build for your legacy computer setup.
          Compiled using NW.js core engine layer version v0.112.0.
        files: GaiaBoughtOS-win-x64.zip
        draft: false
        prerelease: false

name: Compile Standalone Windows EXE Distribution

on:
  push:
    branches: [ master ]

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Download NW.js Windows Runtime Core
      shell: bash
      run: |
        # Pulls down a stable, secure lightweight runtime shell environment
        curl -L https://nwjs.io -o nwjs.zip
        unzip nwjs.zip
        mv nwjs-v0.82.0-win-x64 nwjs-runtime

    - name: Package Gaia Interface into Core Binary Archive
      shell: bash
      run: |
        cd apps/homescreen
        # Compresses the GUI logic code directly into a zip package partition
        zip -r ../../gaia-app.nw *
        cd ../..

    - name: Fuse GUI Archive directly into Windows Executable Header
      shell: cmd
      run: |
        # Merges the compiled binary structures cleanly with no external dependencies
        copy /b nwjs-runtime\nw.exe + gaia-app.nw nwjs-runtime\GaiaBoughtOS.exe

    - name: Assemble Final Production Distribution Gated Build
      shell: bash
      run: |
        mkdir dist-exe
        # Move the newly fused standalone application wrapper out
        cp nwjs-runtime/GaiaBoughtOS.exe dist-exe/
        # Copy critical system support framework DLL binaries 
        cp nwjs-runtime/*.dll dist-exe/
        cp nwjs-runtime/nw.pak dist-exe/
        cp nwjs-runtime/icudtl.dat dist-exe/

    - name: Deploy Compiled Executable Bundle to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: GaiaBought-Windows-EXE-Distribution
        path: dist-exe/

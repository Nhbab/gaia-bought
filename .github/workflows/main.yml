name: Build Pure Gaia Source Code Windows App

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-pure-gaia:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Original Repository Code
      uses: actions/checkout@v4

    - name: Generate Desktop Launcher Shell Environment
      run: |
        mkdir -p dist-gaia-os
        
        # 1. Tạo tệp máy chủ Node.js được sửa lỗi định tuyến đường dẫn tuyệt đối (BASE_DIR)
        cat << 'EOF' > dist-gaia-os/server-core.js
        const http = require('http');
        const fs = require('fs');
        const path = require('path');

        const PORT = 3000;
        // Đặt thư mục gốc là thư mục cha chứa cả 'apps' và 'shared' để sửa lỗi tải ảnh/CSS
        const BASE_DIR = path.resolve(__dirname); 

        const MIME_TYPES = {
            '.html': 'text/html',
            '.css': 'text/css',
            '.js': 'text/javascript',
            '.json': 'application/json',
            '.png': 'image/png',
            '.jpg': 'image/jpeg',
            '.jpeg': 'image/jpeg',
            '.webp': 'image/webp',
            '.svg': 'image/svg+xml',
            '.properties': 'text/plain'
        };

        http.createServer((req, res) => {
            // Loại bỏ các chuỗi tham số truy vấn (?v=...) để tìm đúng tên file gốc
            let cleanUrl = req.url.split('?')[0];
            let targetPath = cleanUrl === '/' ? '/apps/homescreen/index.html' : cleanUrl;
            let filePath = path.join(BASE_DIR, targetPath);
            let extname = String(path.extname(filePath)).toLowerCase();
            let contentType = MIME_TYPES[extname] || 'application/octet-stream';

            fs.readFile(filePath, (error, content) => {
                if (error) {
                    // Nếu không tìm thấy file, thử tìm trong thư mục chia sẻ dự phòng
                    res.writeHead(404, { 'Content-Type': 'text/plain', 'Access-Control-Allow-Origin': '*' });
                    res.end('File Not Found: ' + targetPath);
                } else {
                    // TỰ ĐỘNG KHẮC PHỤC LỖI ĐƠ THẺ GAIA NGAY TRÊN RAM KHI TRUYỀN FILE INDEX
                    if (filePath.endsWith('index.html')) {
                        let htmlContent = content.toString('utf8');
                        htmlContent = htmlContent.replace('<head>', '<head><script>if(!navigator.mozApps){navigator.mozApps={mgmt:{getAll:function(){return{set onsuccess(cb){setTimeout(()=>cb({target:{result:[]}}),50)},set onerror(cb){}}}}};if(!customElements.get("gaia-container")){customElements.define("gaia-container",class extends HTMLElement{freeze(){}thaw(){}removeChild(e,c){e.remove();if(c)c()}})}if(!customElements.get("gaia-dialog")){customElements.define("gaia-dialog",class extends HTMLElement{close(){this.remove();}})}</script>');
                        res.writeHead(200, { 'Content-Type': contentType, 'Access-Control-Allow-Origin': '*' });
                        res.end(htmlContent, 'utf-8');
                    } else {
                        res.writeHead(200, { 'Content-Type': contentType, 'Access-Control-Allow-Origin': '*' });
                        res.end(content);
                    }
                }
            });
        }).listen(PORT, '127.0.0.1', () => {
            console.log(`Gaia OS Core streaming live on http://127.0.0.1:${PORT}`);
        });
        EOF

        # 2. Tạo tệp lệnh khởi chạy Windows đồng bộ
        cat << 'EOF' > dist-gaia-os/Launch-GaiaBought-OS.cmd
        @echo off
        title Initializing Firefox OS Gaia Interface
        cd /d "%~dp0"

        echo Booting Background Streaming Server Core...
        start "" /b node server-core.js
        timeout /t 3 /nobreak >nul

        echo Initializing Graphical User Interface...
        powershell -NoProfile -Command "Start-Process 'msedge.exe' -ArgumentList '--app=\"http://127.0.0\"', '--disable-web-security', '--allow-file-access-from-files', '--no-first-run' -WindowStyle Maximized"
        
        exit
        EOF
        
        sed -i 's/$/\r/' dist-gaia-os/Launch-GaiaBought-OS.cmd

    - name: Pack Pure Unmodified Repository Structure
      run: |
        # Đồng bộ chính xác toàn bộ thư mục 'apps' và 'shared' vào cùng cấp độ với file server-core.js
        if [ -d "apps" ]; then cp -r apps dist-gaia-os/; fi
        if [ -d "shared" ]; then cp -r shared dist-gaia-os/; fi

    - name: Generate Final Compressed Package Zip Archive
      run: |
        zip -r GaiaBought-PureSource-Windows.zip dist-gaia-os/*

    - name: Deploy Compiled Package to GitHub Releases Section
      uses: softprops/action-gh-release@v2
      with:
        tag_name: pure-gaia-v1.0.${{ github.run_number }}
        name: GaiaBought Pure Source Distribution (Build ${{ github.run_number }})
        files: GaiaBought-PureSource-Windows.zip

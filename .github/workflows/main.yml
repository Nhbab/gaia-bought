name: Compile and Release Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write # Grants the workflow permission to create a GitHub Release

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Download Specific NW.js v0.112.0 Windows Engine Core
      shell: bash
      run: |
        # Fetches your exact required binary download link
        curl -L --connect-timeout 20 --retry 5 \
          "https://dl.nwjs.io/v0.112.0/nwjs-v0.112.0-win-x64.zip" -o nwjs.zip

    - name: Extract NW.js Zip Using Native Windows Tools (No Tar)
      shell: powershell
      run: |
        # Uses native Windows architecture to unzip the container to avoid corruption
        Expand-Archive -Path "nwjs.zip" -DestinationPath "." -Force
        Rename-Item -Path "nwjs-v0.112.0-win-x64" -NewName "nwjs-runtime"
        Remove-Item -Path "nwjs.zip"

    - name: Package Gaia Interface using Native PowerShell
      shell: powershell
      run: |
        Compress-Archive -Path "apps\homescreen\*" -DestinationPath "gaia-app.zip" -Force
        Rename-Item -Path "gaia-app.zip" -NewName "gaia-app.nw"

    - name: Fuse GUI Archive Directly into Native Executable Header
      shell: cmd
      run: |
        copy /b nwjs-runtime\nw.exe + gaia-app.nw nwjs-runtime\GaiaBoughtOS.exe

    - name: Assemble Windows Production Distribution Folder
      shell: bash
      run: |
        mkdir dist-exe
        cp nwjs-runtime/GaiaBoughtOS.exe dist-exe/
        cp nwjs-runtime/*.dll dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.dat dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.bin dist-exe/ 2>/dev/null || true

    - name: Generate Final Named Package Zip File
      shell: powershell
      run: |
        # Creates the exact target bundle file ready for your release partition
        Compress-Archive -Path "dist-exe\*" -DestinationPath "GaiaBought-Windows-EXE-v0.112.0.zip" -Force

    - name: Upload Named Zip to GitHub Releases Section
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v0.112.0-${{ github.run_number }}
        name: GaiaBought Desktop Release v0.112.0 (Build ${{ github.run_number }})
        body: |
          Standalone desktop build for Nhbab/gaia-bought repository.
          Fuzed using the official NW.js runtime package engine layer.
        files: GaiaBought-Windows-EXE-v0.112.0.zip
        draft: false
        prerelease: false

name: Compile and Release Legacy Windows EXE (v0.86.0)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write # Grants permissions to generate the Release download tag

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Download Exact Legacy NW.js v0.86.0 Engine Core
      shell: bash
      run: |
        # Pulls down your exact specified older v0.86.0 stable link
        curl -L --connect-timeout 20 --retry 5 \
          "https://dl.nwjs.io/v0.86.0/nwjs-v0.86.0-win-x64.zip" -o nwjs.zip

    - name: Extract Legacy Runtime Using Native PowerShell
      shell: powershell
      run: |
        # Unpacks files using native Windows tools to prevent tar extraction faults
        Expand-Archive -Path "nwjs.zip" -DestinationPath "." -Force
        # Renames the version-matched folder correctly to match our fusion setup
        Rename-Item -Path "nwjs-v0.86.0-win-x64" -NewName "nwjs-runtime"
        Remove-Item -Path "nwjs.zip"

    - name: Package Gaia Interface using Native PowerShell
      shell: powershell
      run: |
        Compress-Archive -Path "apps\homescreen\*" -DestinationPath "gaia-app.zip" -Force
        Rename-Item -Path "gaia-app.zip" -NewName "gaia-app.nw"

    - name: Fuse GUI Archive Directly into Native Executable Header
      shell: cmd
      run: |
        # Stitches your code bundle directly onto the older v0.86.0 execution runtime header
        copy /b nwjs-runtime\nw.exe + gaia-app.nw nwjs-runtime\GaiaBoughtOS.exe

    - name: Assemble Windows Production Distribution Folder
      shell: bash
      run: |
        mkdir dist-exe
        cp nwjs-runtime/GaiaBoughtOS.exe dist-exe/
        cp nwjs-runtime/*.dll dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.dat dist-exe/ 2>/dev/null || true
        cp nwjs-runtime/*.bin dist-exe/ 2>/dev/null || true
        
        # Legacy version-specific assets package catchall (required for v0.86.0 runtime layers)
        cp nwjs-runtime/*.pak dist-exe/ 2>/dev/null || true
        
        if [ -d "nwjs-runtime/locales" ]; then cp -r nwjs-runtime/locales dist-exe/; fi

    - name: Generate Final Named Package Zip File
      shell: powershell
      run: |
        Compress-Archive -Path "dist-exe\*" -DestinationPath "GaiaBought-Windows-EXE-v0.86.0.zip" -Force

    - name: Upload Named Zip to GitHub Releases Section
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v0.86.0-${{ github.run_number }}
        name: GaiaBought Legacy Desktop Release v0.86.0 (Build ${{ github.run_number }})
        body: |
          Standalone desktop build for Nhbab/gaia-bought repository.
          Optimized for older computer processors using the stable v0.86.0 legacy platform engine layer.
        files: GaiaBought-Windows-EXE-v0.86.0.zip
        draft: false
        prerelease: false
